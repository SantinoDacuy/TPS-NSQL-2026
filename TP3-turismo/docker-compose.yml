version: '3.9'

services:

  redis:
    image: redis:7
    container_name: redis_geo
    ports:
      - "6379:6379"

  api:
    build: ./backend
    container_name: turismo_api
    ports:
      - "5000:5000"
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  web:
    build: ./frontend
    container_name: turismo_web
    ports:
      - "8080:80"
    depends_on:
      - api